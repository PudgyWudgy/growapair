<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lua Script</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
        pre { background: #f4f4f4; padding: 1rem; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body>
    <h1>My Lua Script</h1>
    <p>Below is the script content:</p>
    <pre id="scriptArea">Loading...</pre>

    <script>
        // Fetch and display the Lua script
        fetch("script.lua")
            .then(res => res.text())
            .then(text => {
                document.getElementById("scriptArea").textContent = text;
            })
            .catch(err => {
                document.getElementById("scriptArea").textContent = "Error loading script: " + err;
            });
    </script>
</body>
</html>
